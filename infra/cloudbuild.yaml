# ── cloudbuild.yaml ───────────────────────────────────────────
# Automatically builds and deploys to Cloud Run
# on every push to the main branch
#
# Setup:
#   gcloud builds submit --config infra/cloudbuild.yaml

substitutions:
  _SERVICE_NAME: rag-data-assistant
  _REGION: us-central1
  _IMAGE: gcr.io/$PROJECT_ID/${_SERVICE_NAME}

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'infra/Dockerfile'
      - '-t'
      - '${_IMAGE}:$COMMIT_SHA'
      - '-t'
      - '${_IMAGE}:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}:latest']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,GCP_PROJECT_ID=GCP_PROJECT_ID:latest'
      - '--set-env-vars=BIGQUERY_DATASET=ecommerce,APP_ENV=production'

images:
  - '${_IMAGE}:$COMMIT_SHA'
  - '${_IMAGE}:latest'
